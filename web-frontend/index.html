<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickScope</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', 'Fira Code', monospace; background: #0d1117; color: #c9d1d9; }
        .btn { @apply px-4 py-2 rounded font-medium transition-colors; }
        .btn-primary { @apply bg-blue-600 text-white hover:bg-blue-700; }
        .btn-danger { @apply bg-red-600 text-white hover:bg-red-700; }
        .btn-ghost { @apply bg-transparent text-gray-300 hover:bg-gray-800; }
        .card { @apply bg-gray-900 border border-gray-800 rounded-lg p-4; }
        .input { @apply bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white w-full; }
        .badge { @apply px-2 py-0.5 rounded text-xs font-semibold; }
        .badge-green { @apply bg-green-900 text-green-300; }
        .badge-red { @apply bg-red-900 text-red-300; }
        .badge-yellow { @apply bg-yellow-900 text-yellow-300; }
        .sidebar-tab { @apply px-4 py-3 cursor-pointer flex items-center gap-2 text-sm transition-colors; }
        .sidebar-tab:hover { @apply bg-gray-800; }
        .sidebar-tab.active { @apply bg-blue-600 text-white; }
        .table-header { @apply px-3 py-2 text-left text-xs font-medium text-gray-400 uppercase tracking-wider; }
        .table-cell { @apply px-3 py-2 text-sm; }
    </style>
</head>
<body>
    <div id="app"></div>
</body>
</html>
